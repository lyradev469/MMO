# ChainQuest MMO - Railway deployment config
# This deploys ONLY the standalone game server (server/index.ts)
# NOT the Next.js frontend app

[build]
builder = "NIXPACKS"
buildCommand = "npm install --prefix server"

[deploy]
startCommand = "npm install --prefix server && npx --prefix server tsx server/index.ts"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
