app = "chainquest-mmo-server"
primary_region = "ord"

[build]
  dockerfile = "server/Dockerfile"

[env]
  MMO_PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 2000
    soft_limit = 1500

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  # WebSocket upgrade support
  [[services.ports]]
    port = 8080
    handlers = ["tcp"]
